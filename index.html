cat << 'EOF' > index.html
<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GNL1Z Asset Manager Pro - Dynamic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { sonaOrange: '#FF6B00' } } } }
    </script>
    <style>
        .hidden-view { display: none !important; }
        body { transition: background-color 0.3s; font-family: ui-sans-serif, system-ui; }
        .card-bg { background-color: #0f172a; border-color: #1e293b; }
        .light .card-bg { background-color: #ffffff; border-color: #cbd5e1; }
        .loader { border-top-color: #FF6B00; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

    <div id="loading-screen" class="fixed inset-0 z-[100] bg-slate-950 flex flex-col items-center justify-center">
        <div class="loader w-12 h-12 border-4 border-slate-700 rounded-full mb-4"></div>
        <p class="text-sonaOrange font-bold animate-pulse">Chargement de la base GNL1Z...</p>
    </div>

    <nav class="fixed top-0 w-full z-50 bg-slate-950/90 backdrop-blur border-b border-slate-800 px-4 py-3 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <span class="font-black text-xl text-white">GNL1Z <span class="text-sonaOrange">Manager</span></span>
        </div>
        <button onclick="document.documentElement.classList.toggle('light')" class="p-2 rounded-lg border border-slate-700">🌓</button>
    </nav>

    <main class="pt-24 pb-12 px-4 max-w-2xl mx-auto">
        <div id="view-home" class="space-y-4">
            <div class="grid grid-cols-1 gap-4">
                <button onclick="nav('equip')" class="card-bg p-6 rounded-xl border flex flex-col text-left hover:border-sonaOrange transition">
                    <h3 class="text-sonaOrange font-bold text-xl mb-1">Base de Données Équipements</h3>
                    <p class="text-sm text-slate-400" id="stats-label">Chargement des données...</p>
                </button>
                <button onclick="nav('dcs')" class="card-bg p-6 rounded-xl border flex flex-col text-left hover:border-sonaOrange transition">
                    <h3 class="text-sonaOrange font-bold text-xl mb-1">Recherche DCS</h3>
                    <p class="text-sm text-slate-400">Localisation des tags instruments</p>
                </button>
            </div>
        </div>

        <div id="view-equip" class="hidden-view space-y-4">
            <button onclick="nav('home')" class="text-sonaOrange font-bold">← Retour</button>
            <input type="text" id="search-input" placeholder="Tag ou Nom (ex: F-501)..." class="w-full p-4 bg-slate-900 border border-slate-700 rounded-xl outline-none focus:border-sonaOrange" oninput="renderList()">
            <div id="list-container" class="space-y-3"></div>
        </div>

        <div id="view-detail" class="hidden-view space-y-6">
            <button onclick="nav('equip')" class="text-sonaOrange font-bold">← Liste</button>
            <div id="detail-content"></div>
        </div>
    </main>

    <script>
        let GLOBAL_DATA = null;
        const DATA_URL = "https://raw.githubusercontent.com/djslimaniunivboumerdes-netizen/GNL1Z-MANAGER-/main/GNL1Z_DATABASE.json";

        // Initialisation : Fetch du JSON
        async function init() {
            try {
                const response = await fetch(DATA_URL);
                GLOBAL_DATA = await response.json();
                document.getElementById('stats-label').innerText = `${GLOBAL_DATA.equipment_count} Équipements | ${GLOBAL_DATA.spare_parts_count} PDR`;
                document.getElementById('loading-screen').classList.add('hidden-view');
            } catch (error) {
                console.error("Erreur de chargement:", error);
                alert("Erreur lors de la lecture de la base GitHub.");
            }
        }

        function nav(id) {
            document.querySelectorAll('main > div').forEach(v => v.classList.add('hidden-view'));
            document.getElementById('view-' + id).classList.remove('hidden-view');
            if(id === 'equip') renderList();
        }

        function renderList() {
            const query = document.getElementById('search-input').value.toUpperCase();
            const container = document.getElementById('list-container');
            container.innerHTML = '';

            const filtered = GLOBAL_DATA.equipment.filter(e => e.tag.includes(query) || e.name_fr.toUpperCase().includes(query));

            filtered.forEach(e => {
                const div = document.createElement('div');
                div.className = "card-bg p-4 rounded-xl border cursor-pointer hover:border-sonaOrange";
                div.onclick = () => showDetail(e);
                div.innerHTML = `
                    <div class="flex justify-between items-center">
                        <div>
                            <div class="text-sonaOrange font-black">${e.tag}</div>
                            <div class="text-xs text-slate-400">${e.section}</div>
                        </div>
                        <span class="text-[10px] px-2 py-1 rounded bg-slate-800">${e.testing_status}</span>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function showDetail(e) {
            nav('detail');
            const sparePartsHtml = e.spare_parts_list.map(p => `
                <div class="text-[11px] border-b border-slate-800 pb-2 mb-2">
                    <div class="text-sonaOrange font-bold">${p.code} - ${p.description}</div>
                    <div class="flex justify-between text-slate-500">
                        <span>Stock: ${p.stock_location}</span>
                        <span>Qté: ${p.qty_installed}</span>
                    </div>
                </div>
            `).join('');

            document.getElementById('detail-content').innerHTML = `
                <h2 class="text-3xl font-black text-white">${e.tag}</h2>
                <p class="text-sonaOrange mb-6">${e.name_fr}</p>
                
                <div class="space-y-3">
                    <details class="card-bg border rounded-lg p-4"><summary class="font-bold cursor-pointer">1. Type de Test</summary><p class="mt-2 text-sm">${e.testing_status}</p></details>
                    <details class="card-bg border rounded-lg p-4" open><summary class="font-bold cursor-pointer">2. Composants (PDR)</summary><div class="mt-4">${sparePartsHtml || 'Aucune pièce listée'}</div></details>
                    <details class="card-bg border rounded-lg p-4"><summary class="font-bold cursor-pointer">3. Spécifications Techniques</summary><p class="mt-2 text-sm">Poids: ${e.technical.weight_kg}kg | Boulonnerie: ${e.technical.bolt_size}</p></details>
                    <details class="card-bg border rounded-lg p-4"><summary class="font-bold cursor-pointer">4. Levage & Manutention</summary><p class="mt-2 text-sm">Méthode: ${e.maintenance.lifting_method.replace('_', ' ')}</p></details>
                    <details class="card-bg border rounded-lg p-4"><summary class="font-bold cursor-pointer">5. Notes de Maintenance</summary><p class="mt-2 text-sm italic">${e.notes || 'R.A.S'}</p></details>
                </div>
            `;
        }

        init();
    </script>
</body>
</html>
EOF
